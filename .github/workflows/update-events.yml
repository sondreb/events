name: Update events (daily agent)

on:
  schedule:
    # Every day at 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: update-events
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch, extract and translate events
        run: node scripts/fetch-events.mjs
        env:
          # GitHub Models is used for web-page event extraction and translation.
          # COPILOT_SECRET (a fine-grained PAT with Models access) is preferred;
          # the built-in GITHUB_TOKEN works as fallback (permissions: models: read).
          COPILOT_SECRET: ${{ secrets.COPILOT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional fallback: set an OpenAI key as a repo secret to use OpenAI instead.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional: enables web-wide event discovery via Brave Search.
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}

      - name: Commit updated datasets
        id: commit
        run: |
          git config user.name "events-agent[bot]"
          git config user.email "events-agent[bot]@users.noreply.github.com"
          git add public/data/events
          if git diff --cached --quiet; then
            echo "No event changes today."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): daily event update $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes made with the built-in GITHUB_TOKEN do not trigger other
      # workflows, so the Pages deployment is dispatched explicitly using the
      # COPILOT_SECRET PAT whenever new event data was committed.
      - name: Trigger website deployment
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_SECRET || secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main --repo "$GITHUB_REPOSITORY"
